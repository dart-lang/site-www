name: dart_dev_site
publish_to: none
homepage: https://dart.dev

resolution: workspace
environment:
  sdk: ^3.12.0-0

dependencies:
  build: ^4.0.6
  collection: ^1.19.1
  crypto: ^3.0.7
  # Used for accessing the SDK archive storage buckets.
  googleapis: ^16.0.0
  html: ^0.15.6
  http: ^1.6.0
  # Used for formatting dates in the SDK archive.
  intl: ^0.20.2
  jaspr: ^0.23.1
  jaspr_content: ^0.5.2
  # Used as our template engine.
  liquify: ^1.5.1
  markdown: ^7.3.1
  markdown_description_list: ^0.1.1
  meta: ^1.18.2
  # Used for syntax highlighting.
  nanoid2: ^2.0.1
  opal: ^0.2.2
  path: ^1.9.1
  # Used in the SDK archive.
  pub_semver: ^2.2.0
  universal_web: ^1.1.1+1
  # Used to build the Atom feed for the blog.
  xml: ^6.6.1
  yaml: ^3.1.3

dev_dependencies:
  analysis_defaults:
    git:
      url: https://github.com/flutter/website
      path: packages/analysis_defaults
      ref: 6d50799f4dc347398863b83f5dc46d1da8f6c5cd
  build_runner: ^2.15.0
  build_web_compilers: ^4.5.1
  dart_skills_lint:
    git:
      url: https://github.com/flutter/skills
      path: tool/dart_skills_lint
      ref: 66db75d9f221741c33c70d3e641bdfe7bbcfe2f0
  jaspr_builder: ^0.23.1
  jaspr_test: ^0.23.1
  lints: ^6.1.0
  logging: ^1.3.0
  sass: ^1.99.0
  sass_builder: ^2.4.0+1
  test: ^1.31.1

jaspr:
  mode: static
